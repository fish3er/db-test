<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test BD — WIEiT</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel-2: #22262f;
    --text: #e6e8eb;
    --muted: #9aa3ad;
    --accent: #4a9eff;
    --green: #4caf50;
    --red: #ef4444;
    --border: #2c313b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  h1 { font-size: 1.7rem; margin: 0 0 4px; }
  h2 { font-size: 1.25rem; margin: 24px 0 12px; }
  .sub { color: var(--muted); margin: 0 0 24px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .label { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 10px; }

  button {
    font: inherit;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 10px 16px;
    transition: background .15s, border-color .15s;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #06131f;
    font-weight: 600;
  }
  .btn-primary:hover { background: #6cb0ff; }
  .btn-lg { padding: 12px 24px; font-size: 1.05rem; }

  .chip {
    user-select: none;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 0.9rem;
  }
  .chip.on {
    background: rgba(74,158,255,.15);
    border-color: var(--accent);
    color: var(--text);
  }
  .chip .cnt { color: var(--muted); font-size: 0.8rem; margin-left: 4px; }

  .len-opt { flex: 1; min-width: 90px; text-align: center; }
  .len-opt.on { background: rgba(74,158,255,.15); border-color: var(--accent); }

  .counter {
    color: var(--muted);
    margin: 16px 0;
    font-size: .95rem;
  }
  .counter strong { color: var(--text); }

  /* progress */
  .progress {
    height: 8px;
    background: var(--panel-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    width: 0;
    transition: width .25s;
  }

  .meta { color: var(--muted); font-size: .9rem; margin-bottom: 10px; }
  .meta .topic { color: var(--accent); }
  .qtext {
    white-space: pre-wrap;
    font-size: 1.1rem;
    margin: 0 0 18px;
  }
  /* inline code/sql inside questions */
  .qtext code, code.block {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .codeblock {
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #0a0c10;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: .95rem;
    margin: 12px 0;
    overflow-x: auto;
  }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { border-color: var(--accent); background: rgba(74,158,255,.12); }
  .opt .box {
    flex: 0 0 auto;
    width: 20px; height: 20px;
    border: 2px solid var(--muted);
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
  }
  .opt[data-type="single"] .box { border-radius: 999px; }
  .opt[data-type="multi"] .box { border-radius: 5px; }
  .opt.sel .box { border-color: var(--accent); color: var(--accent); }
  .opt .txt { white-space: pre-wrap; }
  .opt.disabled { cursor: default; }
  .opt.disabled:hover { border-color: var(--border); }
  .opt.correct { border-color: var(--green); background: rgba(76,175,80,.15); }
  .opt.correct .box { border-color: var(--green); color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(239,68,68,.15); }
  .opt.wrong .box { border-color: var(--red); color: var(--red); }

  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    font: inherit;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .verdict { font-weight: 600; margin: 14px 0 6px; font-size: 1.05rem; }
  .verdict.ok { color: var(--green); }
  .verdict.bad { color: var(--red); }
  .note {
    color: var(--muted);
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 10px 0;
    white-space: pre-wrap;
  }
  .answer-box {
    background: rgba(76,175,80,.1);
    border: 1px solid var(--green);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 10px 0;
    white-space: pre-wrap;
  }
  .answer-box .label { color: var(--green); margin-bottom: 4px; }

  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .spacer { flex: 1; }

  /* result */
  .score-big { font-size: 3rem; font-weight: 700; }
  .score-pct { font-size: 1.4rem; color: var(--accent); }
  .review-item {
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .review-item.good { background: rgba(76,175,80,.1); border-color: rgba(76,175,80,.5); }
  .review-item.bad { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.5); }
  .review-item .rq { white-space: pre-wrap; margin-bottom: 8px; }
  .review-item .ans { font-size: .95rem; margin: 4px 0; }
  .review-item .ans .k { color: var(--muted); }

  .hidden { display: none; }
  .link-btn {
    background: none; border: none; color: var(--accent); padding: 0;
    text-decoration: underline; cursor: pointer;
  }
  .link-btn:hover { border: none; color: #6cb0ff; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ====================== BAZA PYTAŃ ======================
// type: "single" | "multi" | "open"
const QUESTIONS = [
  // ============ ROLE I UPRAWNIENIA ============
  {
    id: "roles-reporter-reader",
    topic: "Role / uprawnienia",
    type: "single",
    question: "Użytkownik ma przypisaną rolę 'reporter', a rola reporter ma przypisaną rolę 'reader'. Rola 'reader' ma uprawnienia do czytania wierszy w tabeli 'posts'. Roli 'reporter' nie przekazano bezpośrednio takich uprawnień. Co musi zrobić użytkownik, żeby móc przeczytać wiersze z tabeli 'posts'?",
    options: [
      { text: "Ustawić swoją aktualną rolę na 'reporter'.", correct: true },
      { text: "Ustawić swoją aktualną rolę na 'reader'.", correct: false },
      { text: "Użyć komendy GRANT nazwa_roli TO nazwa_użytkownika.", correct: false },
      { text: "Podać hasło do roli 'reader'.", correct: false },
      { text: "Podać hasło do roli 'reporter'.", correct: false },
      { text: "Zdobyć od administratora więcej uprawnień, niż przyznano mu do tej pory.", correct: false }
    ],
    note: "SET ROLE reporter — przyjmujesz rolę reporter, która dziedziczy reader → masz SELECT."
  },
  {
    id: "roles-analyst-viewer",
    topic: "Role / uprawnienia",
    type: "single",
    question: "Użytkownik ma przypisaną rolę 'analyst', a rola analyst ma przypisaną rolę 'viewer'. Rola 'viewer' ma uprawnienia do czytania wierszy w tabeli 'ratings'. Roli 'viewer' nie przekazano bezpośrednio takich uprawnień. Co musi zrobić użytkownik, żeby móc przeczytać wiersze z tabeli 'ratings'?",
    options: [
      { text: "Użyć komendy SET ROLE.", correct: true },
      { text: "Użyć funkcji CURRENT_ROLE().", correct: false },
      { text: "Zmienić swoją aktualną rolę dwukrotnie.", correct: false },
      { text: "Użyć komendy ACTIVATE ROLE.", correct: false },
      { text: "Zdobyć od administratora więcej uprawnień, niż przyznano mu do tej pory.", correct: false }
    ]
  },
  {
    id: "roles-sql-true",
    topic: "Role / uprawnienia",
    type: "multi",
    question: "Wybierz prawdziwe zdania dotyczące użycia ról w SQL.",
    options: [
      { text: "Użytkownik może odpowiednią komendą aktywować jednocześnie drugą rolę, której sam nie posiada, ale która została przyznana jego obecnej roli.", correct: true },
      { text: "Aktywowanie roli jest potrzebne do przekazania jej uprawnień dalej, ale nie do korzystania samemu z uprawnień tej roli.", correct: false },
      { text: "Użytkownik nie może mieć jednocześnie aktywnych wielu niepowiązanych ze sobą ról.", correct: false },
      { text: "Rolę możemy przyznać innej roli tylko wtedy, jeśli dla roli 'otrzymującej' ustawimy hasło.", correct: false }
    ]
  },
  {
    id: "permissions-sql",
    topic: "Role / uprawnienia",
    type: "multi",
    question: "Wybierz prawdziwe zdania dotyczące uprawnień w SQL.",
    options: [
      { text: "Uprawnienie DELETE ON exam.positive_grades pozwoliłoby na usuwanie wierszy z tabeli positive_grades.", correct: true },
      { text: "Można nadać uprawnienie z lub bez możliwości nadawania go dalej.", correct: true },
      { text: "Istnieje specjalne uprawnienie ALL PRIVILEGES.", correct: true },
      { text: "Próba czytania wierszy z tabeli, do której brak użytkownikowi uprawnień, skutkuje zwróceniem pustej tabeli wynikowej.", correct: false }
    ],
    note: "Brak uprawnień → zwraca BŁĄD, nie pustą tabelę."
  },

  // ============ NULL ============
  {
    id: "null-expressions",
    topic: "NULL",
    type: "multi",
    question: "Które z poniższych wyrażeń dają wartość NULL?",
    options: [
      { text: "NULL = NULL", correct: true },
      { text: "NULL AND TRUE", correct: true },
      { text: "NULL IN ('a', 'b', NULL)", correct: true },
      { text: "NULL OR TRUE", correct: false },
      { text: "NOT NULL", correct: true }
    ],
    note: "NULL OR TRUE = TRUE (krótkie spięcie). NULL AND TRUE = NULL. NOT NULL = NULL. NULL IN (...,NULL) = NULL."
  },
  {
    id: "null-equals-null",
    topic: "NULL",
    type: "multi",
    question: "Które z poniższych wyrażeń dają wartość =NULL=?",
    options: [
      { text: "FALSE OR NULL", correct: true },
      { text: "NULL AND FALSE", correct: false },
      { text: "NULL <> NULL", correct: true },
      { text: "NOT NOT NULL", correct: true },
      { text: "NULL IN (SELECT 'dummy' WHERE NULL)", correct: false }
    ],
    note: "NULL AND FALSE = FALSE (krótkie spięcie). NULL IN (empty set) = FALSE."
  },
  {
    id: "null-where",
    topic: "NULL",
    type: "open",
    question: "W tabeli customers jest 91 wierszy. W kolumnie fax tej tabeli są 22 wartości NULL. Ile wierszy zwróci poniższe zapytanie?\n\nSELECT * FROM customers WHERE NULL",
    correctAnswer: "0",
    note: "WHERE NULL jest traktowany jako NIE-prawda → 0 wierszy."
  },

  // ============ NORMALIZACJA ============
  {
    id: "nf-multivalued",
    topic: "Normalizacja",
    type: "single",
    question: "Schemat bazy zakłada użycie atrybutów wielowartościowych. W związku z tym schemat bazy na pewno nie jest w:",
    options: [
      { text: "1NF", correct: true },
      { text: "3NF", correct: false },
      { text: "4NF", correct: false },
      { text: "BCNF", correct: false }
    ],
    note: "Atrybut wielowartościowy łamie 1NF (brak atomowości). Skoro nie ma 1NF → nie ma niczego wyżej."
  },
  {
    id: "nf-dependency-preserving",
    topic: "Normalizacja",
    type: "single",
    question: "Przeprowadzana przez nas dekompozycja schematu bazy zachowuje zależności ('is dependency preserving'). Tzn. dla każdej zależności funkcjonalnej wciąż można znaleźć taki schemat relacji, w którym znajdują się razem wszystkie atrybuty obu stron tej zależności. Uzyskany schemat bazy na pewno nie jest w:",
    options: [
      { text: "BCNF", correct: true },
      { text: "3NF", correct: false },
      { text: "4NF", correct: false },
      { text: "1NF", correct: false }
    ],
    note: "Dekompozycja zachowująca zależności + lossless join — gwarantowana tylko do 3NF, NIE do BCNF."
  },

  // ============ ALGEBRA RELACYJNA ============
  {
    id: "ra-cardinality",
    topic: "Algebra relacyjna",
    type: "multi",
    question: "Które z poniższych operatorów algebry relacyjnej mogą dać w wyniku relację mającą inną liczbę krotek niż (choćby jedna) relacja wejściowa?",
    options: [
      { text: "× (iloczyn kartezjański)", correct: true },
      { text: "Π (projekcja)", correct: true },
      { text: "⋈ (natural join)", correct: true },
      { text: "σ (selekcja)", correct: true },
      { text: "∪ (suma)", correct: true },
      { text: "∩ (przecięcie)", correct: true },
      { text: "− (różnica)", correct: true },
      { text: "ρ (przemianowanie)", correct: false }
    ],
    note: "Tylko ρ (rename) nigdy nie zmienia liczby krotek. Reszta — może."
  },
  {
    id: "ra-cross-join",
    topic: "Algebra relacyjna",
    type: "open",
    question: "Napisz przykładowe zapytanie SQL odpowiadające poniższemu wyrażeniu algebry relacyjnej (DISTINCT można pominąć):\n\nσ_units_in_stock=0(products) ∪ σ_discontinued=1(products)",
    correctAnswer: "SELECT * FROM products WHERE units_in_stock = 0 UNION SELECT * FROM products WHERE discontinued = 1;"
  },
  {
    id: "ra-projection-selection",
    topic: "Algebra relacyjna",
    type: "open",
    question: "Napisz przykładowe zapytanie SQL odpowiadające poniższemu wyrażeniu algebry relacyjnej:\n\nΠ_product_name(σ_units_in_stock=0(products))",
    correctAnswer: "SELECT product_name FROM products WHERE units_in_stock = 0;"
  },
  {
    id: "ra-cross",
    topic: "Algebra relacyjna",
    type: "open",
    question: "Napisz przykładowe wyrażenie algebry relacyjnej odpowiadające poniższemu zapytaniu SQL:\n\nSELECT first_name, last_name, category_name\nFROM employees, categories",
    correctAnswer: "Π_{first_name, last_name, category_name}(employees × categories)"
  },

  // ============ JOINY I KOLUMNY ============
  {
    id: "join-columns-min",
    topic: "JOIN",
    type: "multi",
    question: "Wybierz zapytania, które dadzą wynikową tabelę z najmniejszą liczbą kolumn. Jeśli wszystkie zapytania dadzą takie same liczby kolumn — zaznacz wszystkie. Można przyjąć, że customer_id jest kluczem obcym z orders do customers i nie może być NULLem.",
    options: [
      { text: "SELECT * FROM orders o NATURAL RIGHT JOIN customers c;", correct: true },
      { text: "SELECT * FROM orders o JOIN customers c ON o.customer_id = c.customer_id;", correct: false },
      { text: "SELECT * FROM orders o, customers c WHERE o.customer_id = c.customer_id;", correct: false },
      { text: "SELECT * FROM orders o FULL JOIN customers c ON o.customer_id = c.customer_id;", correct: false }
    ],
    note: "NATURAL JOIN łączy w jedną kolumnę wspólne nazwy (customer_id) → wynik ma o 1 kolumnę mniej."
  },
  {
    id: "join-self-not-equal",
    topic: "JOIN",
    type: "open",
    question: "W tabeli users kluczem głównym jest user_id, a liczba wszystkich wierszy to 10. Ile będzie wierszy w wyniku zapytania?\n\nSELECT u1.user_name, u2.user_name FROM users u1, users u2 WHERE u1.user_id <> u2.user_id;",
    correctAnswer: "90",
    note: "10×10 − 10 (par gdzie u1=u2) = 90."
  },
  {
    id: "join-self-distinct",
    topic: "JOIN",
    type: "open",
    question: "W tabeli users kluczem głównym jest user_id, a liczba wszystkich wierszy to 15. Ile będzie wierszy w wyniku zapytania?\n\nSELECT DISTINCT u1.user_name, u2.user_name FROM users u1 JOIN users u2 USING(user_id);",
    correctAnswer: "15",
    note: "USING(user_id) → join po user_id (PK), więc każdy wiersz łączy się sam ze sobą → 15 par (każdy z samym sobą)."
  },
  {
    id: "join-cross-less",
    topic: "JOIN",
    type: "open",
    question: "W tabeli accounts kluczem głównym jest name, a liczba wszystkich wierszy to 8. Ile będzie wierszy w wyniku poniższego zapytania?\n\nSELECT a1.name, a2.name FROM accounts a1 CROSS JOIN accounts a2 WHERE a1.name < a2.name;",
    correctAnswer: "28",
    note: "C(8,2) = 8*7/2 = 28."
  },
  {
    id: "join-full-outer-using",
    topic: "JOIN",
    type: "open",
    question: "W tabeli accounts kluczem głównym jest name, a liczba wszystkich wierszy to 8. Ile będzie wierszy w wyniku poniższego zapytania?\n\nSELECT a1.name, a2.name FROM accounts a1 FULL OUTER JOIN accounts a2 USING(name);",
    correctAnswer: "8",
    note: "Każdy wiersz łączy się z sobą samym (PK = name), brak NULLi → 8."
  },

  // ============ SELECT / WYRAŻENIA ============
  {
    id: "select-columns-count",
    topic: "SELECT",
    type: "open",
    question: "Ile będzie kolumn w wyniku poniższego zapytania?\n\nSELECT product_id, product_name, 201, (quantity * unit_price)\nFROM products",
    correctAnswer: "4"
  },
  {
    id: "select-row-count-or-d",
    topic: "SELECT",
    type: "open",
    question: "Tabela users zawiera trzy kolumny typu id INT, name VARCHAR(50) i login_data VARCHAR(100). Podaj zawartość przykładowego wiersza tabeli, który NIE zostałby zwrócony przez poniższe zapytanie.\n\nSELECT id, name, login_data FROM users WHERE name > 'D' OR name <= 'D';",
    correctAnswer: "(1, NULL, 'cokolwiek')",
    note: "Wiersz z NULL w kolumnie name — bo NULL > 'D' = NULL, NULL <= 'D' = NULL, NULL OR NULL = NULL → wiersz pominięty."
  },
  {
    id: "select-union-except",
    topic: "SELECT",
    type: "open",
    question: "Ile będzie wierszy w wyniku zapytania?\n\nSELECT 'a' AS txt\nUNION SELECT 'b'\nUNION SELECT 'c'\nEXCEPT SELECT 'c'",
    correctAnswer: "2",
    note: "{'a','b','c'} EXCEPT {'c'} = {'a','b'} → 2 wiersze."
  },
  {
    id: "where-uk",
    topic: "SELECT / WHERE",
    type: "open",
    question: "Jakim najkrótszym ciągiem znaków można uzupełnić lukę (zastąpić ciąg pytajników), żeby w wyniku otrzymać dokładnie wiersze klientów spoza Wielkiej Brytanii ('UK')?\n\nSELECT *\nFROM customers\nWHERE country ??? 'UK';",
    correctAnswer: "<>",
    note: "Najkrótsze: <> (alternatywa dla !=). UWAGA: NULL country nie zostanie zwrócony — zwykle to akceptowalne."
  },
  {
    id: "where-bottle",
    topic: "SELECT / WHERE",
    type: "open",
    question: "Czym można uzupełnić lukę, żeby dostać wiersze produktów, które w kolumnie quantity_per_unit zawierają na początku, w środku lub na końcu napisu frazę 'bottle'?\n\nSELECT product_name, quantity_per_unit, unit_price\nFROM products\nWHERE quantity_per_unit ???;",
    correctAnswer: "LIKE '%bottle%'"
  },
  {
    id: "where-phone-paren",
    topic: "SELECT / WHERE",
    type: "open",
    question: "Czym można uzupełnić lukę, żeby dostać wiersze dokładnie tych klientów, których numery telefonów zaczynają się od nawiasu otwierającego?\n\nSELECT company_name, phone\nFROM customers\nWHERE phone ???;",
    correctAnswer: "LIKE '(%'"
  },
  {
    id: "case-when-coalesce",
    topic: "SELECT",
    type: "open",
    question: "Zaproponuj wyrażenie, którym można zastąpić wyrażenie CASE z tego zapytania (max 25 znaków):\n\nSELECT company_name,\n  CASE WHEN fax IS NULL THEN 'unknown' ELSE fax END\nFROM customers",
    correctAnswer: "COALESCE(fax, 'unknown')"
  },

  // ============ EXISTS / PODZAPYTANIA ============
  {
    id: "exists-uncorrelated-orders",
    topic: "Podzapytania",

// ====================== LOGIKA / UI ======================
const app = document.getElementById('app');
const typeLabel = { single: "jednokrotny wybór", multi: "wielokrotny wybór", open: "otwarte" };

// stan
let state = null;

function fyShuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ---------- START SCREEN ----------
let startCfg = {
  length: 10,                       // 10 | 20 | 'all'
  topics: new Set(QUESTIONS.map(q => q.topic)),
};

function topicCounts() {
  const m = new Map();
  for (const q of QUESTIONS) m.set(q.topic, (m.get(q.topic) || 0) + 1);
  return m;
}

function availableCount() {
  return QUESTIONS.filter(q => startCfg.topics.has(q.topic)).length;
}

function renderStart() {
  const counts = topicCounts();
  const topics = [...counts.keys()].sort((a, b) => a.localeCompare(b, 'pl'));
  const avail = availableCount();

  const lenOpts = [
    { v: 10, l: "10 pytań" },
    { v: 20, l: "20 pytań" },
    { v: "all", l: "Wszystkie" },
  ];

  app.innerHTML = `
    <h1>Test BD — WIEiT</h1>
    <p class="sub">Lokalna aplikacja do nauki SQL / baz danych.</p>

    <div class="panel">
      <p class="label">Długość testu</p>
      <div class="row">
        ${lenOpts.map(o => `
          <button class="len-opt ${startCfg.length === o.v ? 'on' : ''}" data-len="${o.v}">${o.l}</button>
        `).join('')}
      </div>
    </div>

    <div class="panel">
      <p class="label">Tematy (kliknij, by włączyć/wyłączyć)</p>
      <div class="row" id="chips">
        ${topics.map(t => `
          <button class="chip ${startCfg.topics.has(t) ? 'on' : ''}" data-topic="${esc(t)}">
            ${esc(t)}<span class="cnt">${counts.get(t)}</span>
          </button>
        `).join('')}
      </div>
      <div class="row" style="margin-top:12px">
        <button class="link-btn" id="selAll">Zaznacz wszystkie</button>
        <button class="link-btn" id="selNone">Odznacz wszystkie</button>
      </div>
    </div>

    <p class="counter">Baza: <strong>${QUESTIONS.length}</strong> pytań · do dyspozycji: <strong>${avail}</strong></p>

    <button class="btn-primary btn-lg" id="startBtn" ${avail === 0 ? 'disabled' : ''}>Start</button>
  `;

  app.querySelectorAll('[data-len]').forEach(b => b.onclick = () => {
    const v = b.dataset.len;
    startCfg.length = v === 'all' ? 'all' : Number(v);
    renderStart();
  });
  app.querySelectorAll('[data-topic]').forEach(b => b.onclick = () => {
    const t = b.dataset.topic;
    if (startCfg.topics.has(t)) startCfg.topics.delete(t); else startCfg.topics.add(t);
    renderStart();
  });
  app.querySelector('#selAll').onclick = () => { startCfg.topics = new Set(counts.keys()); renderStart(); };
  app.querySelector('#selNone').onclick = () => { startCfg.topics = new Set(); renderStart(); };
  app.querySelector('#startBtn').onclick = startTest;
}

// ---------- BUILD SESSION ----------
function buildSession(pool, lengthCfg) {
  let qs = fyShuffle(pool);
  if (lengthCfg !== 'all') qs = qs.slice(0, lengthCfg);
  // dla każdego pytania przygotuj kolejność opcji
  const items = qs.map(q => {
    const item = { q, answered: false, correct: false, userAnswer: null };
    if (q.type === 'single' || q.type === 'multi') {
      item.order = fyShuffle(q.options.map((_, i) => i));
    }
    return item;
  });
  return { items, idx: 0 };
}

function startTest() {
  const pool = QUESTIONS.filter(q => startCfg.topics.has(q.topic));
  if (pool.length === 0) return;
  state = buildSession(pool, startCfg.length);
  renderQuestion();
}

function startRetryWrong(wrongQuestions) {
  state = buildSession(wrongQuestions, 'all');
  renderQuestion();
}

// ---------- QUESTION SCREEN ----------
function renderQuestion() {
  const { items, idx } = state;
  const item = items[idx];
  const q = item.q;
  const total = items.length;
  const pct = Math.round((idx) / total * 100);

  let body = '';
  if (q.type === 'open') {
    body = `<textarea id="answer" placeholder="Wpisz odpowiedź...">${item.userAnswer ? esc(item.userAnswer) : ''}</textarea>`;
  } else {
    body = `<div id="opts">` + item.order.map((origIdx, pos) => {
      const opt = q.options[origIdx];
      return `<div class="opt" data-type="${q.type}" data-orig="${origIdx}">
        <div class="box"></div>
        <div class="txt">${esc(opt.text)}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  app.innerHTML = `
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="meta">Pytanie ${idx + 1} / ${total} · <span class="topic">${esc(q.topic)}</span> · ${typeLabel[q.type]}</div>
    <div class="panel">
      <div class="qtext">${esc(q.question)}</div>
      ${body}
      <div id="feedback"></div>
      <div class="actions" id="actions">
        <button class="link-btn" id="quitBtn">Wyjdź</button>
        <div class="spacer"></div>
        <button class="btn-primary" id="checkBtn">Sprawdź</button>
      </div>
    </div>
  `;

  app.querySelector('#quitBtn').onclick = () => {
    if (confirm("Wyjść z testu? Postęp zostanie utracony.")) renderStart();
  };

  if (q.type !== 'open') {
    const selected = new Set();
    app.querySelectorAll('.opt').forEach(el => {
      el.onclick = () => {
        if (item.answered) return;
        const orig = Number(el.dataset.orig);
        if (q.type === 'single') {
          selected.clear();
          app.querySelectorAll('.opt').forEach(o => { o.classList.remove('sel'); o.querySelector('.box').textContent = ''; });
          selected.add(orig);
          el.classList.add('sel');
          el.querySelector('.box').textContent = '●';
        } else {
          if (selected.has(orig)) {
            selected.delete(orig);
            el.classList.remove('sel');
            el.querySelector('.box').textContent = '';
          } else {
            selected.add(orig);
            el.classList.add('sel');
            el.querySelector('.box').textContent = '✓';
          }
        }
      };
    });
    item._selected = selected;
  }

  app.querySelector('#checkBtn').onclick = () => checkAnswer(item);
}

function checkAnswer(item) {
  const q = item.q;
  const fb = app.querySelector('#feedback');

  if (q.type === 'open') {
    const ta = app.querySelector('#answer');
    item.userAnswer = ta.value;
    ta.disabled = true;
    item.answered = true;
    fb.innerHTML = `
      <div class="answer-box">
        <div class="label">Poprawna odpowiedź</div>
        <div>${esc(q.correctAnswer)}</div>
      </div>
      ${q.note ? `<div class="note">${esc(q.note)}</div>` : ''}
      <div class="verdict">Oceń się sam:</div>
    `;
    app.querySelector('#actions').innerHTML = `
      <button class="link-btn" id="quitBtn2">Wyjdź</button>
      <div class="spacer"></div>
      <button id="selfBad">✗ Źle</button>
      <button class="btn-primary" id="selfOk">✓ Miałem dobrze</button>
    `;
    app.querySelector('#quitBtn2').onclick = () => { if (confirm("Wyjść z testu?")) renderStart(); };
    app.querySelector('#selfOk').onclick = () => { item.correct = true; next(); };
    app.querySelector('#selfBad').onclick = () => { item.correct = false; next(); };
    return;
  }

  // single / multi
  const selected = item._selected;
  item.userAnswer = [...selected];
  item.answered = true;

  const correctSet = new Set(q.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0));
  let ok = selected.size === correctSet.size;
  for (const s of selected) if (!correctSet.has(s)) ok = false;
  item.correct = ok;

  app.querySelectorAll('.opt').forEach(el => {
    const orig = Number(el.dataset.orig);
    el.classList.add('disabled');
    el.onclick = null;
    const isCorrect = correctSet.has(orig);
    const isSel = selected.has(orig);
    if (isCorrect) el.classList.add('correct');
    if (isSel && !isCorrect) el.classList.add('wrong');
  });

  const last = state.idx === state.items.length - 1;
  fb.innerHTML = `
    <div class="verdict ${ok ? 'ok' : 'bad'}">${ok ? '✓ Dobrze' : '✗ Źle'}</div>
    ${q.note ? `<div class="note">${esc(q.note)}</div>` : ''}
  `;
  app.querySelector('#actions').innerHTML = `
    <button class="link-btn" id="quitBtn2">Wyjdź</button>
    <div class="spacer"></div>
    <button class="btn-primary" id="nextBtn">${last ? 'Zakończ' : 'Następne'}</button>
  `;
  app.querySelector('#quitBtn2').onclick = () => { if (confirm("Wyjść z testu?")) renderStart(); };
  app.querySelector('#nextBtn').onclick = next;
}

function next() {
  if (state.idx < state.items.length - 1) {
    state.idx++;
    renderQuestion();
  } else {
    renderResult();
  }
}

// ---------- RESULT SCREEN ----------
function fmtUserAnswer(item) {
  const q = item.q;
  if (q.type === 'open') {
    return item.userAnswer && item.userAnswer.trim()
      ? esc(item.userAnswer) + (item.correct ? '  (oceniono: dobrze)' : '  (oceniono: źle)')
      : '(brak odpowiedzi)' + (item.correct ? ' (oceniono: dobrze)' : ' (oceniono: źle)');
  }
  const sel = item.userAnswer || [];
  if (sel.length === 0) return '(nic nie zaznaczono)';
  return sel.map(i => esc(q.options[i].text)).join('; ');
}

function fmtCorrectAnswer(q) {
  if (q.type === 'open') return esc(q.correctAnswer);
  return q.options.filter(o => o.correct).map(o => esc(o.text)).join('; ');
}

function renderResult() {
  const items = state.items;
  const total = items.length;
  const score = items.filter(i => i.correct).length;
  const pct = total ? Math.round(score / total * 100) : 0;
  const wrongQuestions = items.filter(i => !i.correct).map(i => i.q);

  app.innerHTML = `
    <h1>Wynik</h1>
    <div class="panel" style="text-align:center">
      <div class="score-big">${score} / ${total}</div>
      <div class="score-pct">${pct}%</div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="newTest">Nowy test</button>
      <button id="retryWrong" ${wrongQuestions.length === 0 ? 'disabled' : ''}>
        Powtórz tylko błędne (${wrongQuestions.length})
      </button>
    </div>

    <h2>Pełny przegląd</h2>
    <div id="review">
      ${items.map((item, n) => {
        const q = item.q;
        return `
          <div class="review-item ${item.correct ? 'good' : 'bad'}">
            <div class="meta">${n + 1}. <span class="topic">${esc(q.topic)}</span> · ${typeLabel[q.type]} · ${item.correct ? '✓' : '✗'}</div>
            <div class="rq">${esc(q.question)}</div>
            <div class="ans"><span class="k">Twoja odpowiedź:</span> ${fmtUserAnswer(item)}</div>
            <div class="ans"><span class="k">Poprawna:</span> ${fmtCorrectAnswer(q)}</div>
            ${q.note ? `<div class="note">${esc(q.note)}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;

  app.querySelector('#newTest').onclick = renderStart;
  const rw = app.querySelector('#retryWrong');
  if (wrongQuestions.length > 0) rw.onclick = () => startRetryWrong(wrongQuestions);
}

// ---------- BOOT ----------
renderStart();
</script>
</body>
</html>
